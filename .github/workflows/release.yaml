name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build agent and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vrouter-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build agent binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/vrouter-agent-linux-amd64 ./cmd/vrouter-agent/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/vrouter-agent-linux-arm64 ./cmd/vrouter-agent/

      - name: Build deb (amd64)
        run: |
          cp dist/vrouter-agent-linux-amd64 dist/vrouter-agent
          nfpm package --packager deb --target dist/
          rm dist/vrouter-agent
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: amd64

      - name: Build deb (arm64)
        run: |
          cp dist/vrouter-agent-linux-arm64 dist/vrouter-agent
          nfpm package --packager deb --target dist/
          rm dist/vrouter-agent
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vrouter-agent-linux-amd64
            dist/vrouter-agent-linux-arm64
            dist/*.deb
